<html> 
<head> 
<script type="text/javascript">
//No argument and No Return value 
function star() 
{  
    var a; 
    document.write("<br>"); 
    for(a=1;a<=70;a++)
    { 
        document.write("*"); 
    } 
    document.write("<br>"); 
} 
</script> 
</head> 
<body> 
    <script type="text/javascript"> 
        star(); 
        document.write("This is Testing"); 
        star(); 
    </script> 
</body> 
</html>
