 <title></title> 
<script type="text/javascript"> 
function star(x)
{  
    var b; 
    document.write("<br>");

    { 
        document.write(b); 
    } 
} 
</script>

<body> 
    <script type="text/javascript"> 
    var a; 
    for(a=1;a<=5;a++)
    { 
        star(a); 
    } 
    </script>
